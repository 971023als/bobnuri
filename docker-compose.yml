services:
  apache-proxy:
    build:
      context: .
      dockerfile: Dockerfile.apache
    image: bobnuri-apache-proxy
    container_name: apache_proxy
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: bobnuri-app
    container_name: bobnuri_app
    restart: unless-stopped
    expose:
      - "80"
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      SECURITY_LEVEL: ${SECURITY_LEVEL}
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: bobnuri_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  mysql_data:
